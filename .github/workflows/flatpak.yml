name: flatpak (test)

on:
  workflow_dispatch:
  push:
    branches:
      - ci/add-flatpak

jobs:
  flatpak:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Add Flathub remote
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak
        run: |
          flatpak-builder --force-clean --repo=repo build-dir path/to/your-manifest.json

      - name: Create bundle
        run: |
          flatpak build-bundle repo FlashLearn.flatpak com.flashlearn.FlashLearn --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlashLearn-Flatpak
          path: FlashLearn.flatpak
